---
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - path: .env
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - backend

  backend:
    image: ksetcomp/fiskalna-2025-backend:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file:
      - path: .env
    depends_on:
      - db
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.fiskalna-2025-backend.rule=Host(`fiskalna.kset.org`) && (PathPrefix(`/api/`) || PathPrefix(`/auth/`) || PathPrefix(`/oauth/`))
      - traefik.http.routers.fiskalna-2025-backend.priority=1000
    networks:
      - frontend
      - backend

  frontend:
    image: ksetcomp/fiskalna-2025-frontend:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - DomainName=fiskalna.kset.org
    networks:
      - frontend

networks:
  backend:
  frontend:
